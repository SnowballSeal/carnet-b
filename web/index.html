<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Carnet B — cuaderno de estudio</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icono.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icono.svg" />
    <meta name="theme-color" content="#f7f5f0" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#211f1c" media="(prefers-color-scheme: dark)" />
    <!-- Aplica el tema guardado antes de pintar, para que no parpadee en claro. -->
    <script>
      try {
        var tema = localStorage.getItem("carnetb.tema");
        if (tema === "claro" || tema === "oscuro") document.documentElement.dataset.tema = tema;
      } catch (e) {}
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
